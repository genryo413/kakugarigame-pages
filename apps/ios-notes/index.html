<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="メモ" />
  <title>メモ</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --surface: #ffffff;
      --surface2: #f2f2f7;
      --separator: rgba(60,60,67,0.18);
      --label: #000000;
      --label2: rgba(60,60,67,0.6);
      --label3: rgba(60,60,67,0.3);
      --tint: #ffcc00;
      --tint-dark: #d4a900;
      --red: #ff3b30;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-height: 96px;
      --toolbar-height: 48px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #1c1c1e;
        --surface2: #2c2c2e;
        --separator: rgba(84,84,88,0.65);
        --label: #ffffff;
        --label2: rgba(235,235,245,0.6);
        --label3: rgba(235,235,245,0.3);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, "Helvetica Neue", sans-serif; background: var(--bg); color: var(--label); }

    /* ---- VIEWS ---- */
    #view-list, #view-editor { position: fixed; inset: 0; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1), opacity 0.3s; }
    #view-editor { transform: translateX(100%); z-index: 10; }
    #view-editor.open { transform: translateX(0); }

    /* ---- NAV BAR ---- */
    .nav-bar {
      background: var(--surface);
      padding-top: calc(var(--safe-top) + 8px);
      border-bottom: 0.5px solid var(--separator);
      position: relative;
      flex-shrink: 0;
    }
    .nav-bar-inner { display: flex; align-items: flex-end; padding: 0 16px 10px; gap: 8px; min-height: 44px; }
    .nav-title {
      font-size: 34px; font-weight: 700; flex: 1;
      transition: font-size 0.2s, opacity 0.2s;
      line-height: 1.1;
    }
    .nav-title.small { font-size: 17px; font-weight: 600; text-align: center; flex: 0; flex: 1; }
    .nav-count { font-size: 13px; color: var(--label2); font-weight: 400; display: block; }
    .nav-btn {
      background: none; border: none; cursor: pointer; padding: 6px;
      font-size: 17px; color: var(--tint-dark); font-weight: 400;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-btn svg { width: 20px; height: 20px; fill: var(--tint-dark); }
    .nav-btn.back { margin-left: -6px; }

    /* ---- SEARCH ---- */
    .search-bar {
      padding: 6px 16px 8px;
      background: var(--surface);
    }
    .search-inner {
      background: var(--surface2);
      border-radius: 10px;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px;
    }
    .search-inner svg { width: 16px; height: 16px; fill: var(--label3); flex-shrink: 0; }
    .search-inner input {
      border: none; background: none; outline: none; font-size: 17px;
      color: var(--label); width: 100%; min-width: 0;
    }
    .search-inner input::placeholder { color: var(--label3); }

    /* ---- LIST ---- */
    #note-list-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #note-list-scroll::-webkit-scrollbar { display: none; }
    .section-header { font-size: 13px; color: var(--label2); font-weight: 600; padding: 16px 16px 6px; }
    .note-row {
      background: var(--surface); border-bottom: 0.5px solid var(--separator);
      padding: 12px 16px; cursor: pointer; display: flex; gap: 12px;
      align-items: flex-start; user-select: none;
      transition: background 0.15s;
      position: relative;
    }
    .note-row:active { background: var(--surface2); }
    .note-row-content { flex: 1; min-width: 0; }
    .note-row-title { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-row-meta { display: flex; gap: 8px; align-items: baseline; margin-top: 2px; }
    .note-row-date { font-size: 13px; color: var(--label2); flex-shrink: 0; }
    .note-row-preview { font-size: 13px; color: var(--label2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-row-chevron { width: 8px; height: 14px; fill: var(--label3); flex-shrink: 0; margin-top: 4px; }
    .note-row.swipe-delete { transform: translateX(-80px); }

    /* delete reveal */
    .note-row-wrap { position: relative; overflow: hidden; }
    .delete-btn-bg {
      position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
      background: var(--red); display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 15px; font-weight: 600;
    }

    /* empty */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 8px; color: var(--label2); padding: 40px; }
    .empty-state svg { width: 56px; height: 56px; fill: var(--label3); }
    .empty-state p { font-size: 17px; font-weight: 500; color: var(--label2); text-align: center; }

    /* ---- TOOLBAR ---- */
    .toolbar {
      background: var(--surface);
      border-top: 0.5px solid var(--separator);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 8px 16px;
      padding-bottom: calc(8px + var(--safe-bottom));
      flex-shrink: 0;
    }
    .toolbar .new-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: var(--tint-dark); font-size: 11px; font-weight: 400;
      padding: 4px 8px;
    }
    .toolbar .new-btn svg { width: 28px; height: 28px; fill: var(--tint-dark); }

    /* ---- EDITOR ---- */
    #view-editor { background: var(--surface); }
    .editor-nav { display: flex; align-items: center; gap: 4px; }
    .editor-nav .spacer { flex: 1; }
    .editor-toolbar {
      background: var(--surface);
      border-top: 0.5px solid var(--separator);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 8px;
      padding-bottom: calc(8px + var(--safe-bottom));
      flex-shrink: 0;
    }
    .editor-toolbar button {
      background: none; border: none; cursor: pointer; padding: 8px;
      color: var(--tint-dark); display: flex; align-items: center; justify-content: center;
    }
    .editor-toolbar button svg { width: 22px; height: 22px; fill: var(--tint-dark); }
    .editor-toolbar button:disabled svg { fill: var(--label3); }
    #editor-area {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 12px 16px 20px;
    }
    #editor-area::-webkit-scrollbar { display: none; }
    #note-content {
      width: 100%; min-height: 100%; outline: none; border: none;
      font-size: 17px; line-height: 1.6; color: var(--label);
      background: transparent; resize: none; font-family: inherit;
      white-space: pre-wrap; word-break: break-word;
    }
    .note-date-display { font-size: 13px; color: var(--label2); text-align: center; padding: 8px 0; flex-shrink: 0; }

    /* ---- FORMATTING HIGHLIGHT ---- */
    .fmt-btn.active svg { fill: var(--tint-dark); opacity: 1; }

    /* share sheet hint */
    .share-toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff; padding: 10px 18px;
      border-radius: 12px; font-size: 14px; pointer-events: none;
      opacity: 0; transition: opacity 0.3s; z-index: 999;
      white-space: nowrap;
    }
    .share-toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LIST VIEW -->
<div id="view-list">
  <div class="nav-bar">
    <div class="nav-bar-inner">
      <div>
        <span class="nav-title" id="list-title">メモ</span>
        <span class="nav-count" id="note-count"></span>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-inner">
        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>
        <input id="search-input" type="search" placeholder="検索" autocomplete="off" />
      </div>
    </div>
  </div>

  <div id="note-list-scroll">
    <div id="note-list-container">
      <!-- notes injected here -->
    </div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <p>メモはありません</p>
    </div>
  </div>

  <div class="toolbar">
    <button class="new-btn" id="new-note-btn" aria-label="新規メモ">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
      新規メモ
    </button>
  </div>
</div>

<!-- EDITOR VIEW -->
<div id="view-editor">
  <div class="nav-bar">
    <div class="nav-bar-inner editor-nav">
      <button class="nav-btn back" id="back-btn" aria-label="戻る">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        メモ
      </button>
      <span class="spacer"></span>
      <button class="nav-btn" id="share-btn" aria-label="共有">
        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <button class="nav-btn" id="more-btn" aria-label="その他">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/><circle cx="5" cy="12" r="1.5" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <div class="note-date-display" id="note-date-display"></div>

  <div id="editor-area">
    <textarea id="note-content" placeholder="メモを入力..." autofocus></textarea>
  </div>

  <div class="editor-toolbar">
    <button id="btn-undo" title="元に戻す" disabled>
      <svg viewBox="0 0 24 24"><path d="M3 7v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <button id="btn-redo" title="やり直す" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 7v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <button id="btn-checklist" title="チェックリスト">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <button id="btn-camera" title="写真">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
    </button>
    <button id="btn-keyboard" title="キーボードを閉じる">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M10 12h4M18 12h.01M8 16h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M12 20v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<div class="share-toast" id="share-toast">コピーしました</div>

<script>
(() => {
  const STORE_KEY = 'ios_notes_v1';

  // ---- STATE ----
  let notes = [];
  let currentId = null;
  let searchQuery = '';
  let saveTimer = null;
  let undoStack = [];
  let redoStack = [];
  let lastSavedContent = '';

  // ---- ELEMENTS ----
  const viewList = document.getElementById('view-list');
  const viewEditor = document.getElementById('view-editor');
  const noteListContainer = document.getElementById('note-list-container');
  const emptyState = document.getElementById('empty-state');
  const noteCount = document.getElementById('note-count');
  const searchInput = document.getElementById('search-input');
  const backBtn = document.getElementById('back-btn');
  const newNoteBtn = document.getElementById('new-note-btn');
  const noteContent = document.getElementById('note-content');
  const noteDateDisplay = document.getElementById('note-date-display');
  const shareBtn = document.getElementById('share-btn');
  const shareToast = document.getElementById('share-toast');
  const btnUndo = document.getElementById('btn-undo');
  const btnRedo = document.getElementById('btn-redo');
  const btnChecklist = document.getElementById('btn-checklist');
  const btnCamera = document.getElementById('btn-camera');
  const btnKeyboard = document.getElementById('btn-keyboard');

  // ---- STORAGE ----
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) notes = JSON.parse(raw);
    } catch(e) { notes = []; }
  }
  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(notes));
  }

  // ---- UTILS ----
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays === 0) {
      return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    } else if (diffDays < 7) {
      const days = ['日','月','火','水','木','金','土'];
      return days[d.getDay()] + '曜日';
    } else {
      return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }
  }
  function fullDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })
      + ' ' + d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  }
  function getTitle(text) {
    const line = (text || '').split('\n').find(l => l.trim()) || '';
    return line.trim() || '新規メモ';
  }
  function getPreview(text) {
    const lines = (text || '').split('\n').filter(l => l.trim());
    return lines.slice(1).join(' ') || '追加テキストなし';
  }

  // ---- RENDER LIST ----
  function renderList() {
    const q = searchQuery.toLowerCase();
    const filtered = q
      ? notes.filter(n => (n.content || '').toLowerCase().includes(q))
      : notes;

    // sort: pinned first, then by updatedAt desc
    const sorted = [...filtered].sort((a, b) => {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return new Date(b.updatedAt) - new Date(a.updatedAt);
    });

    noteListContainer.innerHTML = '';

    if (sorted.length === 0) {
      emptyState.style.display = 'flex';
      noteCount.textContent = '';
      return;
    }
    emptyState.style.display = 'none';
    noteCount.textContent = `${notes.length}件`;

    sorted.forEach(note => {
      const wrap = document.createElement('div');
      wrap.className = 'note-row-wrap';

      const delBg = document.createElement('div');
      delBg.className = 'delete-btn-bg';
      delBg.textContent = '削除';
      delBg.addEventListener('click', e => { e.stopPropagation(); deleteNote(note.id); });

      const row = document.createElement('div');
      row.className = 'note-row';
      row.dataset.id = note.id;
      row.innerHTML = `
        <div class="note-row-content">
          <div class="note-row-title">${esc(getTitle(note.content))}</div>
          <div class="note-row-meta">
            <span class="note-row-date">${formatDate(note.updatedAt)}</span>
            <span class="note-row-preview">${esc(getPreview(note.content))}</span>
          </div>
        </div>
        <svg class="note-row-chevron" viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      `;

      // tap
      row.addEventListener('click', () => openNote(note.id));

      // swipe to delete
      let startX = null, startY = null, swiped = false;
      row.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        swiped = false;
      }, { passive: true });
      row.addEventListener('touchmove', e => {
        if (startX === null) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (Math.abs(dy) > Math.abs(dx)) return;
        if (dx < -10) {
          row.style.transform = `translateX(${Math.max(dx, -80)}px)`;
          row.style.transition = 'none';
          swiped = true;
        } else if (dx > 10 && swiped) {
          row.style.transform = 'translateX(0)';
        }
      }, { passive: true });
      row.addEventListener('touchend', e => {
        if (!swiped) return;
        const dx = e.changedTouches[0].clientX - startX;
        row.style.transition = 'transform 0.25s ease';
        if (dx < -40) {
          row.style.transform = 'translateX(-80px)';
        } else {
          row.style.transform = 'translateX(0)';
        }
        startX = null;
      });

      wrap.appendChild(delBg);
      wrap.appendChild(row);
      noteListContainer.appendChild(wrap);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- OPEN / CLOSE EDITOR ----
  function openNote(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    noteContent.value = note.content || '';
    lastSavedContent = note.content || '';
    noteDateDisplay.textContent = fullDate(note.updatedAt);
    undoStack = [];
    redoStack = [];
    updateUndoRedo();
    viewEditor.classList.add('open');
    // focus after animation
    setTimeout(() => noteContent.focus(), 350);
  }

  function closeEditor() {
    flushSave();
    viewEditor.classList.remove('open');
    currentId = null;
    setTimeout(() => {
      noteContent.value = '';
      renderList();
    }, 320);
  }

  function createNote() {
    const note = {
      id: uid(),
      content: '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      pinned: false,
    };
    notes.unshift(note);
    save();
    openNote(note.id);
    renderList();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    save();
    if (currentId === id) closeEditor();
    else renderList();
  }

  // ---- AUTO SAVE ----
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(flushSave, 500);
  }
  function flushSave() {
    clearTimeout(saveTimer);
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    const content = noteContent.value;
    if (content === lastSavedContent) return;
    note.content = content;
    note.updatedAt = new Date().toISOString();
    lastSavedContent = content;
    noteDateDisplay.textContent = fullDate(note.updatedAt);
    save();
  }

  // ---- UNDO / REDO ----
  let undoTimeout = null;
  function pushUndo(val) {
    undoStack.push(val);
    if (undoStack.length > 200) undoStack.shift();
    redoStack = [];
    updateUndoRedo();
  }
  function updateUndoRedo() {
    btnUndo.disabled = undoStack.length === 0;
    btnRedo.disabled = redoStack.length === 0;
  }

  noteContent.addEventListener('input', e => {
    scheduleSave();
    clearTimeout(undoTimeout);
    undoTimeout = setTimeout(() => {
      pushUndo(noteContent.value);
    }, 300);
  });

  btnUndo.addEventListener('click', () => {
    if (undoStack.length === 0) return;
    redoStack.push(noteContent.value);
    noteContent.value = undoStack.pop();
    updateUndoRedo();
    scheduleSave();
  });
  btnRedo.addEventListener('click', () => {
    if (redoStack.length === 0) return;
    undoStack.push(noteContent.value);
    noteContent.value = redoStack.pop();
    updateUndoRedo();
    scheduleSave();
  });

  // ---- CHECKLIST ----
  btnChecklist.addEventListener('click', () => {
    const ta = noteContent;
    const start = ta.selectionStart;
    const val = ta.value;
    const lineStart = val.lastIndexOf('\n', start - 1) + 1;
    const prefix = '☐ ';
    const before = val.slice(0, lineStart);
    const after = val.slice(lineStart);
    ta.value = before + prefix + after;
    ta.selectionStart = ta.selectionEnd = start + prefix.length;
    scheduleSave();
  });

  // ---- CAMERA (photo picker) ----
  btnCamera.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = () => {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = () => {
          const ta = noteContent;
          const pos = ta.selectionStart;
          const val = ta.value;
          const marker = `[画像: ${input.files[0].name}]`;
          ta.value = val.slice(0, pos) + marker + val.slice(pos);
          ta.selectionStart = ta.selectionEnd = pos + marker.length;
          scheduleSave();
        };
        reader.readAsDataURL(input.files[0]);
      }
    };
    input.click();
  });

  // ---- KEYBOARD DISMISS ----
  btnKeyboard.addEventListener('click', () => {
    noteContent.blur();
  });

  // ---- SHARE ----
  shareBtn.addEventListener('click', () => {
    const text = noteContent.value || '';
    if (navigator.share) {
      navigator.share({ text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        shareToast.classList.add('show');
        setTimeout(() => shareToast.classList.remove('show'), 1800);
      });
    }
  });

  // ---- SEARCH ----
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    renderList();
  });

  // ---- NAV ----
  backBtn.addEventListener('click', closeEditor);
  newNoteBtn.addEventListener('click', createNote);

  // hardware back / swipe-back simulation
  window.addEventListener('popstate', () => {
    if (viewEditor.classList.contains('open')) closeEditor();
  });

  // push a state so popstate fires on back
  history.pushState({ page: 'list' }, '');

  noteContent.addEventListener('focus', () => {
    history.pushState({ page: 'editor' }, '');
  });

  // ---- INIT ----
  load();
  if (notes.length === 0) {
    // seed a welcome note
    notes.push({
      id: uid(),
      content: 'メモへようこそ\nここにメモを書いてみましょう。\n\n・左スワイプで削除\n・右上の共有ボタンでテキストをコピー\n・チェックボックスボタンで ☐ を挿入',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      pinned: false,
    });
    save();
  }
  renderList();
})();
</script>
</body>
</html>
